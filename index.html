  <script>
    // Set theme + base background before paint to avoid a flash of the wrong theme.
    (function () {
      try {
        var t = localStorage.getItem('pp-theme');
        if (t !== 'light' && t !== 'dark') t = 'dark';
        document.documentElement.dataset.theme = t;
        document.documentElement.style.background = t === 'light' ? '#e8eaf2' : '#08080a';
        var fx = localStorage.getItem('pp-bgfx');
        document.documentElement.dataset.bgfx = fx === 'off' ? 'off' : 'on';
      } catch (e) {
        document.documentElement.dataset.theme = 'dark';
        document.documentElement.dataset.bgfx = 'on';
      }
    })();
  </script>
</head>

<body style="margin: 0; padding: 0;">
  <div id="root">
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
